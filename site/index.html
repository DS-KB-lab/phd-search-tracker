<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhD Search Tracker</title>
  <style>
    :root{--bg:#f6f8fc;--card:#fff;--text:#1f2430;--muted:#667085;--line:#e8ecf3;--blue:#2457ff;--green:#0f9d58;--orange:#ff9800;--red:#d93025}
    *{box-sizing:border-box} body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);margin:0}
    .wrap{max-width:1280px;margin:0 auto;padding:28px 18px 60px}
    h1{margin:0 0 8px;font-size:34px} h2{margin:0 0 10px} p{line-height:1.5}
    .muted{color:var(--muted)}
    .hero,.panel,table{background:var(--card);border-radius:18px;box-shadow:0 8px 24px rgba(17,24,39,.06)}
    .hero{padding:24px;margin-bottom:18px}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-top:16px}
    .stat{padding:14px 16px;background:#f8faff;border:1px solid var(--line);border-radius:14px}
    .stat .n{font-size:28px;font-weight:700}
    .filters{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;padding:18px;margin:18px 0}
    label{font-size:13px;color:var(--muted);display:block;margin-bottom:6px}
    select,input{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:12px;background:#fff}
    .tablewrap{overflow:auto}
    table{width:100%;border-collapse:collapse;overflow:hidden}
    th,td{padding:12px 10px;border-bottom:1px solid var(--line);vertical-align:top;text-align:left;font-size:14px}
    th{position:sticky;top:0;background:#f8faff;z-index:1}
    .pill{display:inline-block;padding:4px 9px;border-radius:999px;font-size:12px;margin:2px 6px 2px 0;background:#eef2ff;color:#344054}
    .status-active{background:#e7f6ec;color:#166534}.status-expired{background:#fdecec;color:#991b1b}.status-unknown{background:#fff4db;color:#9a6700}.status-ongoing{background:#eef2ff;color:#344054}
    a{color:var(--blue);text-decoration:none} a:hover{text-decoration:underline}
    .small{font-size:12px;color:var(--muted)}
    .legend{margin-top:10px;font-size:13px;color:var(--muted)}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>PhD Search Tracker</h1>
      <p class="muted">基于你的 Chrome bookmarks 整理出的博士岗位追踪页。已统一加入：<strong>国家</strong>、<strong>方向</strong>、<strong>deadline</strong>、<strong>active / expired</strong>、<strong>medical imaging AI / general AI</strong>。</p>
      <div class="stats" id="stats"></div>
      <div class="legend">说明：<strong>portal</strong> = 招聘入口/学校岗位页；<strong>direct</strong> = 具体博士岗位页。部分 JS-heavy 页面无法完整抽取，deadline 会先标记为 unknown，建议点击原链接复核。</div>
    </section>

    <section class="panel filters">
      <div><label>搜索</label><input id="q" placeholder="搜索标题 / 文件夹 / 国家" /></div>
      <div><label>国家</label><select id="country"><option value="">全部</option></select></div>
      <div><label>类型</label><select id="kind"><option value="">全部</option><option value="direct">direct</option><option value="portal">portal</option></select></div>
      <div><label>状态</label><select id="status"><option value="">全部</option><option value="active">active</option><option value="expired">expired</option><option value="unknown">unknown</option><option value="ongoing portal">ongoing portal</option></select></div>
      <div><label>方向标签</label><select id="tag"><option value="">全部</option><option value="medical imaging AI">medical imaging AI</option><option value="general AI">general AI</option></select></div>
    </section>

    <div class="tablewrap">
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Country</th>
            <th>Direction</th>
            <th>Deadline</th>
            <th>Status</th>
            <th>Kind</th>
            <th>Folder</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
<script>
const DATA_URL = './data.json';
const els = {
  q: document.getElementById('q'), country: document.getElementById('country'), kind: document.getElementById('kind'), status: document.getElementById('status'), tag: document.getElementById('tag'), tbody: document.getElementById('tbody'), stats: document.getElementById('stats')
};
let rows = [];
function pill(text, cls=''){ return `<span class="pill ${cls}">${text}</span>`; }
function escapeHtml(s=''){ return s.replace(/[&<>\"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
function statusClass(status){ if(status==='active') return 'status-active'; if(status==='expired') return 'status-expired'; if(status==='ongoing portal') return 'status-ongoing'; return 'status-unknown'; }
function renderStats(list){
  const direct=list.filter(r=>r.kind==='direct').length;
  const portal=list.filter(r=>r.kind==='portal').length;
  const active=list.filter(r=>r.status==='active').length;
  const expired=list.filter(r=>r.status==='expired').length;
  const countries=new Set(list.map(r=>r.country)).size;
  els.stats.innerHTML=`
    <div class="stat"><div class="n">${list.length}</div><div>总条目</div></div>
    <div class="stat"><div class="n">${direct}</div><div>direct 岗位页</div></div>
    <div class="stat"><div class="n">${portal}</div><div>portal 入口页</div></div>
    <div class="stat"><div class="n">${active}</div><div>active</div></div>
    <div class="stat"><div class="n">${expired}</div><div>expired</div></div>
    <div class="stat"><div class="n">${countries}</div><div>覆盖国家/地区</div></div>`;
}
function renderFilterOptions(){
  const countries=[...new Set(rows.map(r=>r.country))].sort();
  for(const c of countries){ const o=document.createElement('option'); o.value=c; o.textContent=c; els.country.appendChild(o); }
}
function filtered(){
  const q=els.q.value.trim().toLowerCase();
  return rows.filter(r=>{
    if(els.country.value && r.country!==els.country.value) return false;
    if(els.kind.value && r.kind!==els.kind.value) return false;
    if(els.status.value && r.status!==els.status.value) return false;
    if(els.tag.value && r.directionTag!==els.tag.value) return false;
    if(q){
      const hay=[r.title,r.folder,r.country,(r.notes||[]).join(' ')].join(' ').toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
}
function render(){
  const list=filtered();
  renderStats(list);
  els.tbody.innerHTML=list.map(r=>`<tr>
    <td><a href="${r.url}" target="_blank" rel="noopener noreferrer">${escapeHtml(r.title)}</a><div class="small">${escapeHtml(r.host||'')}</div></td>
    <td>${escapeHtml(r.country)}</td>
    <td>${pill(r.directionTag)}</td>
    <td>${escapeHtml(r.deadline||'unknown')}</td>
    <td>${pill(r.status, statusClass(r.status))}</td>
    <td>${pill(r.kind)}</td>
    <td>${escapeHtml(r.folder)}</td>
    <td>${(r.notes||[]).map(n=>`<div>${escapeHtml(n)}</div>`).join('')}</td>
  </tr>`).join('');
}
fetch(DATA_URL).then(r=>r.json()).then(data=>{ rows=data; renderFilterOptions(); render(); ['input','change'].forEach(ev=>Object.values(els).forEach(el=>{ if(el && (el.tagName==='INPUT' || el.tagName==='SELECT')) el.addEventListener(ev, render); })); });
</script>
</body>
</html>
